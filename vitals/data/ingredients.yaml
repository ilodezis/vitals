# Ingredient/drug identity normalization — canonical key -> aliases.
#
# Backbone for vitals.services.conflict_catalog.normalize_ingredient(): a
# supplement's free-text ``name`` (RU or EN, any casing) is normalized to a
# stable ``key`` so conflict_rules can match it regardless of spelling. Aliases
# are matched as whole words/phrases (space-padded substring) against the
# lowercased, ё->е-normalized name — see conflict_catalog.py for the algorithm.
#
# Keys here double as the canonical ``key`` written to Supplement.key. Add new
# canonical entries as new rules need them; keep aliases realistic (names a
# Russian- or English-speaking user would actually type), not exhaustive brand
# lists. A name that matches nothing here falls back to a transliterating slug
# (supplements_service.slugify) — still stable, just not linked to any rule.

