# Curated compound reference for the HRT/TRT domain — the pharmacological
# "база" behind HrtCompound. Seeded (upserted by `key`) into the compounds
# catalog; a user's dose log references one of these by key.
#
# This file describes MOLECULES, not products. Brand / underground-lab (UGL) /
# batch / actual measured concentration are tracked as plain fields on each
# dose row (HrtDose), NOT here — one molecule (e.g. testosterone enanthate) is
# sold under dozens of brands, so brand never belongs on the shared reference.
#
# Fields per entry:
#   key                 stable slug (never renamed; renaming orphans user rows)
#   name                canonical English name
#   name_ru             Russian display name
#   compound_class      one of: testosterone, nandrolone, trenbolone, boldenone,
#                       drostanolone, methenolone, dhb, trestolone, oral_aas,
#                       ai, serm, support, gh, igf, peptide
#   ester               esterification (null for base hormone / orals / blends)
#   route               intramuscular | subcutaneous | oral | transdermal
#   dose_unit           mg (default) | iu | mcg — the unit the user logs a dose
#                       in. GH/gonadotropins are dosed in IU, most peptides and
#                       IGF-1 analogs in mcg; omit for ordinary mg compounds.
#   conc_mg_ml          typical vial concentration, mg/ml (injectables only)
#   tablet_mg           typical tablet strength, mg (orals only)
#   half_life_hours     approximate elimination/depot half-life (see caveat)
#   active_fraction     mass of parent hormone per mg of esterified compound —
#                       used to convert an injected mg of "test enanthate" into
#                       mg of actual testosterone for the active-release graph.
#                       1.0 for base hormones and orals.
#   aromatizes          true | false | partial — informational (E2 management)
#   aliases             common street/short names, for search & log matching
#                       (NOT brands — those are per-vial)
#   note                short free text
#
# CAVEAT: half-lives are population averages from the literature and vary by
# source, injection site, and depot volume. They drive an ILLUSTRATIVE active-
# release estimate only — real hormone levels come from Labs. This catalog does
# not, and must not, prescribe or recommend doses.

