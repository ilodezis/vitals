# Curated cross-domain conflict-rule catalog — the single source of truth for
# `conflict_rules` (see vitals/services/conflict_catalog.sync_catalog).
#
# Each entry is upserted by `code` (stable, never reused/renumbered — renaming
# a code creates a new row and orphans the old one). Editing rule_type/domains/
# conditions/severity/message/params/category/source/evidence here and re-running
# sync takes effect immediately; the one field sync never touches is `active`
# (the user's toggle on /interactions).
#
# condition_a / condition_b are matched by conflict_engine._matches — plain
# key:value is equality; a value can be an operator object ($gt/$gte/$lt/$lte/
# $in/$nin/$exists/$contains), and the whole condition can use $any/$all/$not.
#
# domain_a/domain_b must be one of vitals.enums.Domain. rule_type is one of
# vitals.enums.RuleType (hard_block/soft_warn/timing_separation); severity is
# one of vitals.enums.Severity (block/warn/info). evidence is A (strong —
# meta-analyses/RCTs/regulatory guidance) / B (moderate) / C (weak/theoretical).
#
# category is one of: absorption, pharmacogenomics, dermatology, lab_safety,
# glp1, contraindication.

# ═══════════════════════════════════════════════════════════════════════════
# DERMATOLOGY — skincare ↔ skincare, supplements ↔ skincare
# ═══════════════════════════════════════════════════════════════════════════

