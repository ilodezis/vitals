{% extends "base.html" %}

{% block title %}{{ t("login.page_title") }}{% endblock %}

{% block content %}
<div class="relative min-h-[85vh] flex items-center justify-center p-6 overflow-hidden">
    <!-- Ambient glowing background blobs -->
    <div class="absolute top-1/4 left-1/3 -translate-x-1/2 -translate-y-1/2 w-80 h-80 rounded-full bg-[var(--accent)] opacity-[0.05] blur-[80px] pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/3 translate-x-1/2 translate-y-1/2 w-96 h-96 rounded-full bg-[var(--violet)] opacity-[0.04] blur-[100px] pointer-events-none"></div>

    <div class="relative w-full max-w-sm p-6 sm:p-8 space-y-7 rounded-2xl animate-float-up"
         style="background: rgba(44, 41, 51, 0.45); backdrop-filter: blur(16px); border: 1px solid rgba(75, 69, 85, 0.55); box-shadow: var(--shadow-lg); border-radius: var(--radius-lg);">

        <!-- Header / Logo -->
        <div class="flex flex-col items-center space-y-4">
            <div class="w-12 h-12 rounded-xl bg-[var(--accent-soft)] border border-[var(--accent-line)] flex items-center justify-center shadow-[0_8px_20px_-6px_rgba(245,166,35,0.3)]">
                <svg class="w-6 h-6 text-[var(--accent)] animate-[pulse-glow_2.5s_infinite_ease-in-out]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12h2.5l2.5-6 3.5 12 2.5-9 1.5 3h3" />
                </svg>
            </div>
            <div class="text-center space-y-1">
                <h1 class="v-text-heading text-lg font-extrabold tracking-tight">Vitals OS</h1>
                <p class="v-text-micro" style="color: var(--muted)">{{ t("login.subtitle") }}</p>
            </div>
        </div>

        {% if error %}
        <div class="v-alert block text-center text-xs py-2.5" style="border-radius: var(--radius-sm);">
            {{ t("login.error_prefix") }}{{ error }}
        </div>
        {% endif %}

        <!-- Form -->
        <form action="/login" method="POST" class="space-y-4">
            <input type="hidden" name="next" value="{{ next }}">
            
            <div class="space-y-2">
                <label for="username" class="v-label">{{ t("login.username") }}</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-[var(--muted)]">
                        <svg class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </span>
                    <input type="text" id="username" name="username" required autocomplete="username" 
                           class="v-input pl-10">
                </div>
            </div>

            <div class="space-y-2">
                <label for="password" class="v-label">{{ t("login.password") }}</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-[var(--muted)]">
                        <svg class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                    </span>
                    <input type="password" id="password" name="password" required autocomplete="current-password" 
                           class="v-input pl-10">
                </div>
            </div>

            <button type="submit" class="v-btn w-full mt-6 py-3">{{ t("login.submit") }}</button>
        </form>
    </div>
</div>
{% endblock %}
